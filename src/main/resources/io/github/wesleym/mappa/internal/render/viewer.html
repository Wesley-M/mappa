<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root { --bg:{{BG}}; --pill:#1b1f27; --pill-border:#2a2f3a; --text:#e6e8eb; --muted:#9aa0a6; --accent:#8b5cf6; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden;
    font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  #stage { position:fixed; inset:0; cursor:grab; touch-action:none; }
  #stage.panning { cursor:grabbing; }
  #stage svg { width:100%; height:100%; display:block; }
  #bar { position:fixed; top:14px; left:14px; display:flex; align-items:center; gap:2px; padding:4px;
    background:var(--pill); border:1px solid var(--pill-border); border-radius:10px;
    box-shadow:0 6px 18px rgba(0,0,0,.4); user-select:none; }
  #bar button { all:unset; cursor:pointer; color:var(--text); height:28px; min-width:30px; text-align:center;
    border-radius:7px; font-size:15px; }
  #bar button.wide { padding:0 12px; font-size:12px; }
  #bar button:hover { background:rgba(255,255,255,.08); }
  #bar .pct { color:var(--muted); min-width:50px; text-align:center; font-variant-numeric:tabular-nums; font-size:12px; }
  #bar .sep { width:1px; height:18px; background:var(--pill-border); margin:0 5px; }
  #bar input { all:unset; color:var(--text); font-size:12px; width:130px; height:26px; padding:0 8px; }
  #bar input::placeholder { color:var(--muted); }
  #results { position:fixed; top:54px; left:14px; width:230px; max-height:46vh; overflow:auto; display:none;
    background:var(--pill); border:1px solid var(--pill-border); border-radius:8px; padding:4px;
    box-shadow:0 8px 22px rgba(0,0,0,.45); }
  .result { padding:6px 9px; border-radius:6px; cursor:pointer; font-size:12px; color:var(--text); }
  .result:hover, .result.active { background:rgba(139,92,246,.22); }
  .result .badge { color:var(--muted); font-size:11px; margin-left:6px; }
  .corner { position:fixed; bottom:12px; color:var(--muted); font-size:12px; user-select:none; }
  #title { left:16px; max-width:50vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #hint { right:16px; }
  /* Interactive overlay over the (flat) SVG, in the same coordinate space so it pans/zooms with it. Click a
     table to focus it: a scrim dims everything except the table + its FK neighbours, the links light up, and
     the focused table breathes. */
  .cb-hit { fill:#000; fill-opacity:0; stroke:none; cursor:pointer; pointer-events:all; }
  .cb-scrim { pointer-events:none; transition:fill-opacity .32s ease; }
  .cb-link, .cb-near, .cb-sel, .cb-ping { transform-box:fill-box; transform-origin:center; pointer-events:none; }
  .cb-link { fill:none; stroke:var(--accent); stroke-width:2.4; stroke-linecap:round; opacity:.95;
    filter:url(#cb-glow); stroke-dasharray:2 11; animation:cb-flow 1s linear infinite; }
  .cb-near { fill:var(--accent); fill-opacity:.05; stroke:var(--accent); stroke-opacity:.7; stroke-width:1.8;
    filter:url(#cb-glow); }
  .cb-sel  { fill:none; stroke:var(--accent); filter:url(#cb-glow); animation:cb-pulse 2s ease-in-out infinite; }
  .cb-ping { fill:none; stroke:var(--accent); animation:cb-ping 2.4s ease-out infinite; }
  @keyframes cb-pulse { 0%,100% { stroke-width:2.4; stroke-opacity:.6; } 50% { stroke-width:4.4; stroke-opacity:1; } }
  @keyframes cb-flow { to { stroke-dashoffset:-13; } }
  @keyframes cb-ping { 0% { transform:scale(1); stroke-opacity:.45; stroke-width:2.5; }
    100% { transform:scale(1.18); stroke-opacity:0; stroke-width:1; } }
  @media (prefers-reduced-motion:reduce) { .cb-sel,.cb-link,.cb-ping { animation:none; } .cb-sel { stroke-width:3; } .cb-ping { display:none; } }
</style>
</head>
<body>
  <div id="stage">{{SVG_CONTENT}}</div>
  <div id="bar">
    <button id="zout" title="Zoom out">&minus;</button>
    <span class="pct" id="pct">100%</span>
    <button id="zin" title="Zoom in">+</button>
    <button class="wide" id="fit" title="Fit to screen">Fit</button>
    <span class="sep"></span>
    <input id="search" type="text" placeholder="Find table&hellip;" autocomplete="off" spellcheck="false">
  </div>
  <div id="results"></div>
  <div id="title" class="corner">{{TITLE}}</div>
  <div id="hint" class="corner">drag to pan &middot; scroll to zoom &middot; click a table to focus</div>
  <script id="diagram-data" type="application/json">{{DATA}}</script>
<script>
(function () {
  var stage = document.getElementById('stage');
  var svg = stage.querySelector('svg');
  if (!svg) { return; }
  var SVGNS = 'http://www.w3.org/2000/svg';

  // ---- pan / zoom (drives the SVG viewBox) -------------------------------------------------------
  function num(v) { return parseFloat(String(v || '').replace(/[^0-9.\-]/g, '')) || 0; }
  var base, vb = svg.getAttribute('viewBox');
  if (vb) { var p = vb.split(/[\s,]+/).map(Number); base = { x: p[0], y: p[1], w: p[2], h: p[3] }; }
  else { base = { x: 0, y: 0, w: num(svg.getAttribute('width')) || 1000, h: num(svg.getAttribute('height')) || 800 }; }
  svg.removeAttribute('width'); svg.removeAttribute('height');
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  var view = { x: base.x, y: base.y, w: base.w, h: base.h };
  var MIN = 0.05, MAX = 40;
  function apply() {
    svg.setAttribute('viewBox', view.x + ' ' + view.y + ' ' + view.w + ' ' + view.h);
    document.getElementById('pct').textContent = Math.round(base.w / view.w * 100) + '%';
  }
  function fit() { view = { x: base.x, y: base.y, w: base.w, h: base.h }; apply(); }
  function zoomAt(clientX, clientY, factor) {
    var r = stage.getBoundingClientRect();
    var px = (clientX - r.left) / r.width, py = (clientY - r.top) / r.height;
    var scale = Math.max(MIN, Math.min(MAX, base.w / view.w * factor));
    var nw = base.w / scale, nh = base.h / scale;
    var wx = view.x + px * view.w, wy = view.y + py * view.h;
    view = { x: wx - px * nw, y: wy - py * nh, w: nw, h: nh };
    apply();
  }
  function zoomCenter(f) { var r = stage.getBoundingClientRect(); zoomAt(r.left + r.width / 2, r.top + r.height / 2, f); }
  function zoomToBox(b) {
    var pad = Math.max(b.w, b.h) * 0.55 + 40;
    view = { x: b.x - pad, y: b.y - pad, w: b.w + pad * 2, h: b.h + pad * 2 };
    apply();
  }
  stage.addEventListener('wheel', function (e) { e.preventDefault(); zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.0015)); }, { passive: false });
  stage.addEventListener('dblclick', function (e) { zoomAt(e.clientX, e.clientY, 1.6); });
  document.getElementById('zin').onclick = function () { zoomCenter(1.25); };
  document.getElementById('zout').onclick = function () { zoomCenter(0.8); };
  document.getElementById('fit').onclick = fit;

  var pts = {}, down = {}, dragging = {}, pinch = null;
  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
  stage.addEventListener('pointerdown', function (e) {
    down[e.pointerId] = { x: e.clientX, y: e.clientY };
    pts[e.pointerId] = { x: e.clientX, y: e.clientY };
    if (Object.keys(pts).length === 2) { var k = Object.keys(pts); pinch = dist(pts[k[0]], pts[k[1]]); }
  });
  stage.addEventListener('pointermove', function (e) {
    if (!pts[e.pointerId]) { return; }
    if (!dragging[e.pointerId]) {
      // Only begin a drag once the pointer really moves — a tap must stay a click, since capturing the
      // pointer up front would steal the click from the table underneath (nothing would select).
      var d0 = down[e.pointerId];
      if (Math.abs(e.clientX - d0.x) + Math.abs(e.clientY - d0.y) < 4) { return; }
      try { stage.setPointerCapture(e.pointerId); } catch (err) { /* not all browsers/elements */ }
      dragging[e.pointerId] = true;
      stage.classList.add('panning');
    }
    var prev = pts[e.pointerId];
    pts[e.pointerId] = { x: e.clientX, y: e.clientY };
    var k = Object.keys(pts);
    if (k.length === 2 && pinch) {
      var d = dist(pts[k[0]], pts[k[1]]);
      zoomAt((pts[k[0]].x + pts[k[1]].x) / 2, (pts[k[0]].y + pts[k[1]].y) / 2, d / pinch);
      pinch = d; return;
    }
    var r = stage.getBoundingClientRect();
    view.x -= (e.clientX - prev.x) / r.width * view.w;
    view.y -= (e.clientY - prev.y) / r.height * view.h;
    apply();
  });
  function release(e) {
    delete pts[e.pointerId]; delete down[e.pointerId]; delete dragging[e.pointerId];
    if (Object.keys(pts).length < 2) { pinch = null; }
    if (Object.keys(pts).length === 0) { stage.classList.remove('panning'); }
  }
  stage.addEventListener('pointerup', release);
  stage.addEventListener('pointercancel', release);
  fit();

  // ---- interactive overlay: click a table to focus it (dim the rest, pulse it, light its FK links) ----
  var data = null;
  try { data = JSON.parse(document.getElementById('diagram-data').textContent); } catch (e) { data = null; }
  if (!data || !data.tables || !data.tables.length) { return; }

  function el(name) { return document.createElementNS(SVGNS, name); }
  var bgColor = (getComputedStyle(document.documentElement).getPropertyValue('--bg') || '').trim() || '#0f1115';

  // A soft accent glow (gaussian blur merged under the source) for the focus ring + links.
  var defs = el('defs'), filter = el('filter');
  filter.setAttribute('id', 'cb-glow');
  filter.setAttribute('x', '-60%'); filter.setAttribute('y', '-60%'); filter.setAttribute('width', '220%'); filter.setAttribute('height', '220%');
  var blur = el('feGaussianBlur'); blur.setAttribute('stdDeviation', '3'); blur.setAttribute('result', 'b');
  var merge = el('feMerge'), mb = el('feMergeNode'), ms = el('feMergeNode');
  mb.setAttribute('in', 'b'); ms.setAttribute('in', 'SourceGraphic');
  merge.appendChild(mb); merge.appendChild(ms);
  filter.appendChild(blur); filter.appendChild(merge); defs.appendChild(filter);
  // A soft blur for the dim scrim, so its cut-outs feather instead of clipping each table's drop shadow.
  var soft = el('filter');
  soft.setAttribute('id', 'cb-soft');
  soft.setAttribute('x', '-20%'); soft.setAttribute('y', '-20%'); soft.setAttribute('width', '140%'); soft.setAttribute('height', '140%');
  var sblur = el('feGaussianBlur'); sblur.setAttribute('stdDeviation', '7'); sblur.setAttribute('in', 'SourceGraphic');
  soft.appendChild(sblur); defs.appendChild(soft);
  svg.appendChild(defs);

  var fx = el('g'); fx.setAttribute('class', 'cb-fx'); svg.appendChild(fx);            // scrim + links + outlines
  var hits = el('g'); hits.setAttribute('class', 'cb-hits'); svg.appendChild(hits);   // click targets, on top

  var centers = [], adj = data.tables.map(function () { return new Set(); });
  data.tables.forEach(function (t, i) {
    var r = el('rect');
    r.setAttribute('x', t.x); r.setAttribute('y', t.y); r.setAttribute('width', t.w); r.setAttribute('height', t.h);
    r.setAttribute('rx', '8'); r.setAttribute('class', 'cb-hit');
    r.addEventListener('click', function (ev) { ev.stopPropagation(); select(i === pinned ? null : i); });
    hits.appendChild(r);
    centers.push({ x: t.x + t.w / 2, y: t.y + t.h / 2 });
  });
  (data.edges || []).forEach(function (e) { if (adj[e[0]] && adj[e[1]]) { adj[e[0]].add(e[1]); adj[e[1]].add(e[0]); } });

  var pinned = null;
  function rectPath(x, y, w, h) { return 'M' + x + ',' + y + 'h' + w + 'v' + h + 'h' + (-w) + 'Z'; }
  function roundRectPath(x, y, w, h, r) {
    return 'M' + (x + r) + ',' + y + 'h' + (w - 2 * r) + 'a' + r + ',' + r + ' 0 0 1 ' + r + ',' + r
      + 'v' + (h - 2 * r) + 'a' + r + ',' + r + ' 0 0 1 ' + (-r) + ',' + r
      + 'h' + (-(w - 2 * r)) + 'a' + r + ',' + r + ' 0 0 1 ' + (-r) + ',' + (-r)
      + 'v' + (-(h - 2 * r)) + 'a' + r + ',' + r + ' 0 0 1 ' + r + ',' + (-r) + 'Z';
  }
  function outline(t, cls) {
    var r = el('rect');
    r.setAttribute('x', t.x - 7); r.setAttribute('y', t.y - 7);
    r.setAttribute('width', t.w + 14); r.setAttribute('height', t.h + 14);
    r.setAttribute('rx', '12'); r.setAttribute('class', cls);
    return r;
  }
  // Where the line from a table's centre toward (tx,ty) meets the table's edge (a little outside the box), so a
  // link touches the box border instead of running into the middle of it.
  function borderPoint(t, tx, ty) {
    var cx = t.x + t.w / 2, cy = t.y + t.h / 2, dx = tx - cx, dy = ty - cy;
    if (!dx && !dy) { return { x: cx, y: cy }; }
    var s = Math.min(dx ? (t.w / 2 + 6) / Math.abs(dx) : Infinity, dy ? (t.h / 2 + 6) / Math.abs(dy) : Infinity);
    return { x: cx + dx * s, y: cy + dy * s };
  }
  // A gentle arc between two points — softer to the eye than a straight line.
  function linkPath(a, b) {
    var mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2, dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy) || 1;
    var off = Math.min(len * 0.1, 34);
    return 'M' + a.x + ',' + a.y + 'Q' + (mx - dy / len * off) + ',' + (my + dx / len * off) + ' ' + b.x + ',' + b.y;
  }
  // A soft entrance: fade in with a touch of scale, optionally staggered.
  function enter(node, delay) {
    if (!node.animate) { return; }
    node.animate([{ opacity: 0, transform: 'scale(.92)' }, { opacity: 1, transform: 'scale(1)' }],
      { duration: 320, delay: delay || 0, easing: 'cubic-bezier(.2,.75,.25,1)', fill: 'backwards' });
  }
  function select(i) {
    while (fx.firstChild) { fx.removeChild(fx.firstChild); }
    pinned = i;
    if (i === null) { return; }
    var focus = [i].concat(Array.from(adj[i]));
    // Scrim over the whole canvas, focus + neighbours punched out as large rounded, feathered holes (so each
    // table's drop shadow is fully inside the cut-out and never clipped into a hard edge); eases its dim in.
    var d = rectPath(base.x - 60, base.y - 60, base.w + 120, base.h + 120);
    focus.forEach(function (j) { var t = data.tables[j]; d += roundRectPath(t.x - 20, t.y - 20, t.w + 40, t.h + 40, 22); });
    var scrim = el('path');
    scrim.setAttribute('d', d); scrim.setAttribute('fill-rule', 'evenodd');
    scrim.setAttribute('fill', bgColor); scrim.setAttribute('class', 'cb-scrim');
    scrim.setAttribute('filter', 'url(#cb-soft)');
    scrim.style.fillOpacity = '0';
    fx.appendChild(scrim);
    requestAnimationFrame(function () { scrim.style.fillOpacity = '0.62'; });
    // Curved, glowing FK links drawn from the focus to each neighbour, lightly staggered.
    var n = 0;
    adj[i].forEach(function (j) {
      var a = borderPoint(data.tables[i], centers[j].x, centers[j].y);
      var b = borderPoint(data.tables[j], centers[i].x, centers[i].y);
      var p = el('path'); p.setAttribute('d', linkPath(a, b)); p.setAttribute('class', 'cb-link');
      fx.appendChild(p); enter(p, 90 + n * 45); n++;
    });
    var k = 0;
    adj[i].forEach(function (j) { var o = outline(data.tables[j], 'cb-near'); fx.appendChild(o); enter(o, 70 + k * 45); k++; });
    fx.appendChild(outline(data.tables[i], 'cb-ping'));                 // an emanating sonar ring
    var sel = outline(data.tables[i], 'cb-sel'); fx.appendChild(sel); enter(sel, 0);   // the breathing focus ring
  }

  // Click on empty canvas clears the focus — but a pan-drag must not.
  var dragged = false;
  stage.addEventListener('pointerdown', function () { dragged = false; });
  stage.addEventListener('pointermove', function (e) { if (e.buttons) { dragged = true; } });
  stage.addEventListener('click', function () { if (!dragged && pinned !== null) { select(null); } });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && pinned !== null) { select(null); } });

  // Search: filter table names; click/Enter focuses + zooms to the match.
  var search = document.getElementById('search');
  var results = document.getElementById('results');
  function focusTable(i) { select(i); zoomToBox(data.tables[i]); }
  search.addEventListener('input', function () {
    var q = search.value.trim().toLowerCase();
    results.innerHTML = '';
    if (!q) { results.style.display = 'none'; return; }
    var matches = data.tables
      .map(function (t, i) { return { n: String(t.n || ''), d: (adj[i] ? adj[i].size : 0), i: i }; })
      .filter(function (m) { return m.n.toLowerCase().indexOf(q) >= 0; })
      .sort(function (a, b) { return a.n.length - b.n.length; })
      .slice(0, 20);
    matches.forEach(function (m, k) {
      var row = document.createElement('div');
      row.className = 'result' + (k === 0 ? ' active' : '');
      row.appendChild(document.createTextNode(m.n));
      var badge = document.createElement('span'); badge.className = 'badge';
      badge.textContent = m.d + ' link' + (m.d === 1 ? '' : 's');
      row.appendChild(badge);
      row.onclick = function () { focusTable(m.i); results.style.display = 'none'; search.value = m.n; };
      results.appendChild(row);
    });
    results.style.display = matches.length ? 'block' : 'none';
  });
  search.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { var first = results.querySelector('.result'); if (first) { first.click(); } }
    else if (e.key === 'Escape') { search.value = ''; results.style.display = 'none'; search.blur(); }
  });
})();
</script>
</body>
</html>
