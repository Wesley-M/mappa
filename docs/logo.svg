  <circle cx="46" cy="78" r="8" fill="#2B2620" stroke="url(#ink)" stroke-width="4"/>
  <circle cx="74" cy="54" r="10.5" fill="#22B0A6"/>
  <text x="126" y="72" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="46"
